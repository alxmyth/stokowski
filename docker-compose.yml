services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Workflow mount — accepts a file OR a directory on the host side.
      # Single-project: STOKOWSKI_WORKFLOW_HOST_PATH unset → ./workflow.yaml
      # Multi-project:  set STOKOWSKI_WORKFLOW_HOST_PATH=./workflows/ in .env
      # The container-side target (/app/workflow) adapts to whichever shape
      # the host path is; the orchestrator reads STOKOWSKI_WORKFLOW_PATH at
      # startup (see stokowski/main.py:resolve_workflow_paths).
      - ${STOKOWSKI_WORKFLOW_HOST_PATH:-./workflow.yaml}:/app/workflow:ro
      - ./prompts:/app/prompts:ro
      - ./logs:/app/logs
      # Read-only view of the host's .claude dir so the orchestrator can read
      # plugin config to rewrite container paths. Never written.
      - ${HOME}/.claude:/host-claude:ro
      # Read-write shim dir for staging rewritten plugin configs. The host
      # path is passed to agent docker runs for :ro bind-mounts. Must exist.
      - ${HOME}/.stokowski-plugin-shim:/plugin-shim
    env_file: .env
    environment:
      - HOST_HOME=${HOME}
      # Passed through to workflow.yaml; keeps paths in one place.
      - HOST_PLUGIN_SHIM=${HOME}/.stokowski-plugin-shim
      # Tells the orchestrator where to find workflow config(s) inside the
      # container. Fixed to the mount target above; operators change the
      # HOST side via STOKOWSKI_WORKFLOW_HOST_PATH, not this.
      - STOKOWSKI_WORKFLOW_PATH=/app/workflow
    ports:
      - "${STOKOWSKI_PORT:-4200}:4200"
    command: ["--port", "4200"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4200/api/v1/state"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

# Per-issue workspace volumes (stokowski-ws-*) are created dynamically
# by the orchestrator via `docker volume create`. The sessions volume
# is only needed when inherit_claude_config is false.
volumes:
  stokowski-sessions:
