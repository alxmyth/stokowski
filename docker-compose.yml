services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workflow.yaml:/app/workflow.yaml:ro
      - ./prompts:/app/prompts:ro
      - ./logs:/app/logs
    env_file: .env
    environment:
      - HOST_HOME=${HOME}
    ports:
      - "${STOKOWSKI_PORT:-4200}:4200"
    command: ["workflow.yaml", "--port", "4200"]
    # Restarts on crash (up to 5x) but not on clean stop or host reboot.
    # Use 'unless-stopped' or 'always' if you need reboot survival.
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4200/api/v1/state"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

# Per-issue workspace volumes (stokowski-ws-*) are created dynamically
# by the orchestrator via `docker volume create`. The sessions volume
# is only needed when inherit_claude_config is false.
volumes:
  stokowski-sessions:
